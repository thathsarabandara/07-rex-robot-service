version: "3.9"

services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "9002:9002"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - rex_shared_network

networks:
  rex_shared_network:
    external: true
    name: rex_shared_network
